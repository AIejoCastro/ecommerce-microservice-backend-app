spring:
  datasource:
    url: jdbc:h2:mem:order_test_db;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  flyway:
    enabled: false
  cloud:
    config:
      enabled: false
    loadbalancer:
      enabled: false
  main:
    allow-bean-definition-overriding: true
  config:
    import: optional:classpath:/

server:
  servlet:
    context-path: /order-service

logging:
  level:
    org.springframework: WARN
    com.selimhorri: INFO

eureka:
  client:
    enabled: false
