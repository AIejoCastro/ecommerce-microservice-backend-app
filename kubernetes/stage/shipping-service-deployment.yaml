apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: ecommerce-stage
  labels:
    app: shipping-service
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
        environment: staging
    spec:
      containers:
        - name: shipping-service
          image: alejocastro/shipping-service-ecommerce-boot:stage-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8600
          envFrom:
            - configMapRef:
                name: microservices-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8600
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8600
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: ecommerce-stage
  labels:
    app: shipping-service
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: shipping-service
  ports:
    - name: http
      port: 8600
      targetPort: 8600
