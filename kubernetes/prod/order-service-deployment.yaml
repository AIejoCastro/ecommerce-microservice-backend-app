apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce-prod
  labels:
    app: order-service
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        environment: production
    spec:
      containers:
        - name: order-service
          image: alejocastro/order-service-ecommerce-boot:prod-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8300
          envFrom:
            - configMapRef:
                name: microservices-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8300
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8300
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce-prod
  labels:
    app: order-service
    environment: production
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 8300
      targetPort: 8300
