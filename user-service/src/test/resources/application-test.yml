spring:
  application:
    name: user-service-test
  datasource:
    url: jdbc:h2:mem:user_service_test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  main:
    allow-bean-definition-overriding: true
logging:
  level:
    root: WARN
