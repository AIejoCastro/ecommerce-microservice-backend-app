spring:
  application:
    name: shipping-service-test
  datasource:
    url: jdbc:h2:mem:shipping_service_test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  main:
    allow-bean-definition-overriding: true
  cloud:
    config:
      enabled: false
logging:
  level:
    root: WARN
